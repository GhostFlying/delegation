name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v<VERSION> tag to publish
        required: true
        type: string

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  gate:
    name: Validate release ref
    runs-on: ubuntu-latest
    outputs:
      commit: ${{ steps.contract.outputs.commit }}
      tag: ${{ steps.contract.outputs.tag }}
      version: ${{ steps.contract.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Validate trusted release ref
        id: contract
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          test "$GITHUB_REF" = "refs/heads/$DEFAULT_BRANCH"
          [[ "$RELEASE_TAG" != refs/* ]]
          git check-ref-format "refs/tags/$RELEASE_TAG"
          git fetch --force origin \
            "+refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH" \
            "+refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          commit=$(git rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")
          mapfile -t version_lines < <(git show "$commit:plugins/delegation/VERSION")
          test "${#version_lines[@]}" -eq 1
          version=${version_lines[0]%$'\r'}
          test -n "$version"
          test "$RELEASE_TAG" = "v$version"
          git merge-base --is-ancestor \
            "$commit" "refs/remotes/origin/$DEFAULT_BRANCH"
          printf 'commit=%s\n' "$commit" >> "$GITHUB_OUTPUT"
          printf 'tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

  build:
    name: Build release artifacts
    needs: gate
    runs-on: ubuntu-latest
    outputs:
      artifact_id: ${{ steps.upload.outputs['artifact-id'] }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.gate.outputs.commit }}
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          check-latest: false
          cache: true
      - name: Rebuild release artifacts
        run: go run ./cmd/releasepack -out dist
      - name: Upload untrusted build output
        id: upload
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-build-${{ github.run_id }}-${{ github.run_attempt }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  verify:
    name: Verify release artifacts
    needs: [gate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.gate.outputs.commit }}
          path: source
          persist-credentials: false
      - name: Download build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: dist
      - name: Verify tracked manifest and files
        shell: bash
        run: |
          set -euo pipefail
          diff -u \
            source/plugins/delegation/release-artifacts.sha256 \
            dist/release-artifacts.sha256
          test "$(find dist -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 7
          test "$(find dist -mindepth 1 -maxdepth 1 ! -type f | wc -l)" -eq 0
          archive_assets="$RUNNER_TEMP/archive-assets.txt"
          manifest_assets="$RUNNER_TEMP/manifest-assets.txt"
          LC_ALL=C find dist -mindepth 1 -maxdepth 1 -type f \
            -name 'delegation_*' -printf '%f\n' | LC_ALL=C sort > "$archive_assets"
          LC_ALL=C awk '
            {
              digest = substr($0, 1, 64)
              separator = substr($0, 65, 2)
              name = substr($0, 67)
              if (length(digest) != 64 || digest !~ /^[0-9a-f]+$/ ||
                  separator != "  " ||
                  name !~ /^delegation_[A-Za-z0-9][A-Za-z0-9._-]*$/) {
                exit 1
              }
              print name
            }
          ' dist/release-artifacts.sha256 | LC_ALL=C sort > "$manifest_assets"
          test "$(wc -l < "$archive_assets")" -eq 6
          test "$(wc -l < "$manifest_assets")" -eq 6
          test "$(LC_ALL=C sort -u "$manifest_assets" | wc -l)" -eq 6
          diff -u "$manifest_assets" "$archive_assets"
          (cd dist && sha256sum --strict -c release-artifacts.sha256)

  publish:
    name: Publish GitHub Release
    needs: [gate, build, verify]
    runs-on: ubuntu-latest
    environment: github-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ needs.gate.outputs.commit }}
          path: source
          fetch-depth: 0
          persist-credentials: false
      - name: Download verified build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ needs.build.outputs.artifact_id }}
          path: dist
      - name: Revalidate and publish tag assets
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          EXPECTED_COMMIT: ${{ needs.gate.outputs.commit }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.gate.outputs.tag }}
          VERSION: ${{ needs.gate.outputs.version }}
        run: |
          set -euo pipefail
          diff -u \
            source/plugins/delegation/release-artifacts.sha256 \
            dist/release-artifacts.sha256
          test "$(find dist -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 7
          test "$(find dist -mindepth 1 -maxdepth 1 ! -type f | wc -l)" -eq 0
          archive_assets="$RUNNER_TEMP/archive-assets.txt"
          manifest_assets="$RUNNER_TEMP/manifest-assets.txt"
          LC_ALL=C find dist -mindepth 1 -maxdepth 1 -type f \
            -name 'delegation_*' -printf '%f\n' | LC_ALL=C sort > "$archive_assets"
          LC_ALL=C awk '
            {
              digest = substr($0, 1, 64)
              separator = substr($0, 65, 2)
              name = substr($0, 67)
              if (length(digest) != 64 || digest !~ /^[0-9a-f]+$/ ||
                  separator != "  " ||
                  name !~ /^delegation_[A-Za-z0-9][A-Za-z0-9._-]*$/) {
                exit 1
              }
              print name
            }
          ' dist/release-artifacts.sha256 | LC_ALL=C sort > "$manifest_assets"
          test "$(wc -l < "$archive_assets")" -eq 6
          test "$(wc -l < "$manifest_assets")" -eq 6
          test "$(LC_ALL=C sort -u "$manifest_assets" | wc -l)" -eq 6
          diff -u "$manifest_assets" "$archive_assets"
          (cd dist && sha256sum --strict -c release-artifacts.sha256)

          mapfile -t asset_names < "$archive_assets"
          assets=()
          for name in "${asset_names[@]}"; do
            assets+=("dist/$name")
          done
          assets+=(dist/release-artifacts.sha256)

          git -C source fetch --force origin \
            "+refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH" \
            "+refs/tags/$RELEASE_TAG:refs/tags/$RELEASE_TAG"
          actual_commit=$(git -C source rev-parse --verify "refs/tags/$RELEASE_TAG^{commit}")
          test "$actual_commit" = "$EXPECTED_COMMIT"
          git -C source merge-base --is-ancestor \
            "$EXPECTED_COMMIT" "refs/remotes/origin/$DEFAULT_BRANCH"

          flags=()
          version_core=${VERSION%%+*}
          if [[ "$version_core" == *-* ]]; then
            flags+=(--prerelease)
          fi
          gh release create "$RELEASE_TAG" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Delegation $VERSION" \
            --generate-notes \
            "${flags[@]}"
