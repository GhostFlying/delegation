name: Release candidate

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  package:
    name: Package candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          check-latest: false
          cache: true
      - name: Build candidate twice
        run: |
          go run ./cmd/releasepack -out dist
          go run ./cmd/releasepack -out dist-rebuild
          diff -r dist dist-rebuild
      - name: Verify exact release target matrix
        shell: bash
        run: |
          set -euo pipefail
          version=$(tr -d '\r\n' < plugins/delegation/VERSION)
          expected="$RUNNER_TEMP/expected-release-assets.txt"
          actual="$RUNNER_TEMP/actual-release-assets.txt"
          manifest="$RUNNER_TEMP/manifest-release-assets.txt"
          printf '%s\n' \
            "delegation_${version}_darwin_amd64.tar.gz" \
            "delegation_${version}_darwin_arm64.tar.gz" \
            "delegation_${version}_linux_amd64.tar.gz" \
            "delegation_${version}_linux_arm64.tar.gz" \
            "delegation_${version}_windows_amd64.zip" \
            "delegation_${version}_windows_arm64.zip" \
            | LC_ALL=C sort > "$expected"
          LC_ALL=C find dist -mindepth 1 -maxdepth 1 -type f \
            -name 'delegation_*' -printf '%f\n' | LC_ALL=C sort > "$actual"
          sed -nE 's/^[0-9a-f]{64}  (delegation_[A-Za-z0-9._+-]+)$/\1/p' \
            dist/release-artifacts.sha256 | LC_ALL=C sort > "$manifest"
          test "$(find dist -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 7
          test "$(find dist -mindepth 1 -maxdepth 1 ! -type f | wc -l)" -eq 0
          diff -u "$expected" "$actual"
          diff -u "$expected" "$manifest"
          (cd dist && sha256sum --strict -c release-artifacts.sha256)
      - name: Upload candidate for review
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: delegation-release-candidate-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
