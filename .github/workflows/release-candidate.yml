name: Release candidate

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  package:
    name: Package candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          check-latest: false
          cache: true
      - name: Build candidate twice
        run: |
          go run ./cmd/releasepack -out dist
          go run ./cmd/releasepack -out dist-rebuild
          diff -r dist dist-rebuild
      - name: Upload candidate for review
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: delegation-release-candidate-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
