name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GOTOOLCHAIN: local

jobs:
  native:
    name: Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          check-latest: false
          cache: true
      - name: Verify Go toolchain
        run: go env GOVERSION
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...
      - name: Test macOS LaunchAgent round trip
        if: runner.os == 'macOS'
        shell: bash
        run: |
          go build -trimpath -buildvcs=false -o "$RUNNER_TEMP/delegation" ./cmd/delegation
          DELEGATION_DARWIN_INTEGRATION=1 \
            DELEGATION_DARWIN_BINARY="$RUNNER_TEMP/delegation" \
            go test ./internal/userservice -run '^TestDarwinLaunchAgentRoundTrip$' -count=1
      - name: Test POSIX launchers and installer
        if: runner.os != 'Windows'
        shell: bash
        run: GO=go ./tests/posix_plugin_test.sh
      - name: Test Windows launchers and installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tests/windows_plugin_test.ps1
      - name: Test Windows Task Scheduler round trip
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          DELEGATION_WINDOWS_INTEGRATION: "1"
          DELEGATION_WINDOWS_BINARY: ${{ runner.temp }}/delegation.exe
        run: |
          go build -o $env:DELEGATION_WINDOWS_BINARY ./cmd/delegation
          go test ./internal/userservice -run 'TestWindowsTaskScheduler(RoundTrip|RequiresRuntimeReadiness)' -count=1

  race:
    name: Race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          check-latest: false
          cache: true
      - run: go test -race ./...

  cross-compile:
    name: Cross compile (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          check-latest: false
          cache: true
      - name: Compile tests
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test -run '^$' -exec /bin/true ./...

  plugin-contract:
    name: Plugin contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Check out pinned Codex validators
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: openai/codex
          ref: 44918ea10c0f99151c6710411b4322c2f5c96bea
          path: .ci/codex
          persist-credentials: false
          sparse-checkout: |
            codex-rs/skills/src/assets/samples/plugin-creator/scripts
            codex-rs/skills/src/assets/samples/skill-creator/scripts
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.13"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          check-latest: false
          cache: true
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.15.0
      - name: Install validation tools
        run: |
          python -m pip install 'PyYAML==6.0.3'
          npm install --global '@openai/codex@0.144.1'
      - name: Validate plugin and skills
        run: |
          python .ci/codex/codex-rs/skills/src/assets/samples/plugin-creator/scripts/validate_plugin.py plugins/delegation
          python .ci/codex/codex-rs/skills/src/assets/samples/skill-creator/scripts/quick_validate.py plugins/delegation/skills/delegation-setup
          python .ci/codex/codex-rs/skills/src/assets/samples/skill-creator/scripts/quick_validate.py plugins/delegation/skills/cross-device-delegation
      - name: Install from the local marketplace
        shell: bash
        run: |
          export CODEX_HOME="$HOME/.codex-delegation-ci"
          mkdir -p "$CODEX_HOME"
          codex --version | grep -F 'codex-cli 0.144.1'
          codex plugin marketplace add "$GITHUB_WORKSPACE" --json > "$RUNNER_TEMP/marketplace-add.json"
          codex plugin add delegation@delegation --json > "$RUNNER_TEMP/plugin-add.json"
          codex plugin list --available --json > "$RUNNER_TEMP/plugin-list.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          temp = Path(os.environ["RUNNER_TEMP"])
          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          added = json.loads((temp / "plugin-add.json").read_text())
          listed = json.loads((temp / "plugin-list.json").read_text())
          manifest_version = json.loads(
              (workspace / "plugins/delegation/.codex-plugin/plugin.json").read_text()
          )["version"]
          runtime_version = (workspace / "plugins/delegation/VERSION").read_text().strip()
          assert manifest_version == runtime_version
          assert added["pluginId"] == "delegation@delegation"
          assert added["version"] == manifest_version
          entry = next(item for item in listed["installed"] if item["pluginId"] == "delegation@delegation")
          assert entry["installed"] is True
          assert entry["enabled"] is True
          assert entry["installPolicy"] == "AVAILABLE"
          assert entry["authPolicy"] == "ON_INSTALL"
          launcher = Path(added["installedPath"]) / "scripts" / "delegation-mcp"
          assert os.access(launcher, os.X_OK)
          PY
      - name: Reinstall a cachebusted plugin snapshot
        shell: bash
        run: |
          set -euo pipefail
          export CODEX_HOME="$HOME/.codex-delegation-ci"
          snapshot="$RUNNER_TEMP/cachebuster-marketplace"
          mkdir -p "$snapshot/.agents/plugins" "$snapshot/plugins"
          cp .agents/plugins/marketplace.json "$snapshot/.agents/plugins/marketplace.json"
          cp -R plugins/delegation "$snapshot/plugins/delegation"
          python .ci/codex/codex-rs/skills/src/assets/samples/plugin-creator/scripts/update_plugin_cachebuster.py \
            --cachebuster ci-m11 "$snapshot/plugins/delegation"
          codex plugin remove delegation@delegation --json > "$RUNNER_TEMP/plugin-remove.json"
          codex plugin marketplace remove delegation --json > "$RUNNER_TEMP/marketplace-remove.json"
          codex plugin marketplace add "$snapshot" --json > "$RUNNER_TEMP/cache-marketplace-add.json"
          codex plugin add delegation@delegation --json > "$RUNNER_TEMP/cache-plugin-add.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          temp = Path(os.environ["RUNNER_TEMP"])
          snapshot = temp / "cachebuster-marketplace"
          base_version = (snapshot / "plugins/delegation/VERSION").read_text().strip()
          added = json.loads((temp / "cache-plugin-add.json").read_text())
          assert added["version"] == f"{base_version}+codex.ci-m11"
          assert Path(added["installedPath"]).name == added["version"]
          assert (snapshot / "plugins/delegation/VERSION").read_text().strip() == base_version
          PY
      - name: Test three isolated Codex peers
        shell: bash
        run: |
          set -euo pipefail
          go build -trimpath -buildvcs=false -o "$RUNNER_TEMP/delegation" ./cmd/delegation
          DELEGATION_E2E_BINARY="$RUNNER_TEMP/delegation" \
            CODEX_BINARY="$(command -v codex)" \
            go test -tags=integration -count=1 -v ./tests/codex_peer_e2e

  release-package:
    name: Deterministic release package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: 1.26.5
          check-latest: false
          cache: true
      - name: Build twice
        run: |
          go run ./cmd/releasepack -out dist-first
          go run ./cmd/releasepack -out dist-second
      - name: Compare candidate bytes
        run: diff -r dist-first dist-second
      - name: Verify exact release target matrix
        shell: bash
        run: |
          set -euo pipefail
          version=$(tr -d '\r\n' < plugins/delegation/VERSION)
          expected="$RUNNER_TEMP/expected-release-assets.txt"
          actual="$RUNNER_TEMP/actual-release-assets.txt"
          manifest="$RUNNER_TEMP/manifest-release-assets.txt"
          printf '%s\n' \
            "delegation_${version}_darwin_amd64.tar.gz" \
            "delegation_${version}_darwin_arm64.tar.gz" \
            "delegation_${version}_linux_amd64.tar.gz" \
            "delegation_${version}_linux_arm64.tar.gz" \
            "delegation_${version}_windows_amd64.zip" \
            "delegation_${version}_windows_arm64.zip" \
            | LC_ALL=C sort > "$expected"
          LC_ALL=C find dist-first -mindepth 1 -maxdepth 1 -type f \
            -name 'delegation_*' -printf '%f\n' | LC_ALL=C sort > "$actual"
          sed -nE 's/^[0-9a-f]{64}  (delegation_[A-Za-z0-9._+-]+)$/\1/p' \
            dist-first/release-artifacts.sha256 | LC_ALL=C sort > "$manifest"
          test "$(find dist-first -mindepth 1 -maxdepth 1 -type f | wc -l)" -eq 7
          test "$(find dist-first -mindepth 1 -maxdepth 1 ! -type f | wc -l)" -eq 0
          diff -u "$expected" "$actual"
          diff -u "$expected" "$manifest"
          (cd dist-first && sha256sum --strict -c release-artifacts.sha256)
